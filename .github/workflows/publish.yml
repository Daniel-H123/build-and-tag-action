name: Publish

on:
  release:
    types: [published, edited]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - run: npm ci
      - run: npm run build
      - uses: ./
        with:
          tagName: ${{ github.event.release.tag_name }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
